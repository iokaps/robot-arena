# Code-A-Bot Arena Configuration

# Game title
title: 'Code-A-Bot Arena'

# Lobby
gameLobbyMd: |
  # Welcome to Code-A-Bot Arena!

  **Program your robot. Battle your friends. Only one bot survives.**

  **Match size:** 2-10 players

  ## How It Works

  1. 🤖 Each player controls a robot on the arena grid
  2. ⏱️ You have 60 seconds to program 5 moves
  3. ⚡ All robots execute their programs simultaneously
  4. 💥 Last bot standing wins!

  ## Commands

  - **Move Forward** - Move one cell in facing direction
  - **Rotate Left/Right** - Turn 90 degrees
  - **Shoot** - Fire a laser (instant hit-scan)
  - **Empty slot** - Stay put this turn

  ## Pickups

  - **Health Pack** - Restore 1 life up to the 3-life maximum
  - **Shield** - Block the next incoming hit
  - **Power Cell** - Make your next shot deal 2 damage

  Pickups spawn during the match, usually toward the center of the arena.

  ---

  *Waiting for the host to start the match...*

