# Help
menuHelpMd: |
  # How to Play Code-A-Bot Arena

  ## Goal
  Be the last robot standing. If the final bots destroy each other on the same tick, the round ends in a draw.

  ## Round Flow
  1. **Programming Phase** (60 seconds)
    - Tap commands to program up to 5 moves
    - Plan carefully - once submitted, your sequence is locked

  2. **Execution Phase**
     - All robots execute their programs simultaneously
    - Rotations, movement, pickups, lasers, hazards, and conveyors resolve in order

  3. **Repeat** until one robot remains

  ## Commands

  | Command | Effect |
  |---------|--------|
  | ↑ Move | Move forward one cell |
  | ↺ Rotate Left | Turn 90° counter-clockwise |
  | ↻ Rotate Right | Turn 90° clockwise |
  | ⊕ Shoot | Fire a laser in facing direction |
  | Empty slot | Do nothing this turn |

  ## Pickups

  | Pickup | Effect |
  |--------|--------|
  | ❤️ Health Pack | Restore 1 life, up to 3 |
  | 🛡️ Shield | Block the next incoming hit |
  | ⚡ Power Cell | Make your next shot deal 2 damage |

  Pickups spawn during the match, usually in the center of the arena.

  ## Hazards & Rules
  - Each robot has **3 lives**
  - Getting hit by a laser removes 1 life
  - Robots that collide both stop moving
  - Lasers are blocked by obstacles and other robots
  - Map pits eliminate instantly, while shrink skull pits drain 1 life per tick
  - Conveyors push robots at the end of each tick

  ## Tips
  - Predict where opponents will move
  - Use obstacles for cover
  - Leaving an empty slot can be a smart strategy
  - Grab center pickups when the arena opens up
  - Watch the edge when the skull ring is about to shrink

